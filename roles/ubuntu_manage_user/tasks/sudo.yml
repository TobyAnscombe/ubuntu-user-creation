---
# sudo: false actively removes the drop-in rather than leaving it in place —
# sudo access is never silently retained from a previous run.
# validate with visudo -cf before placement to avoid writing a broken sudoers file.
- name: Grant passwordless sudo access
  become: true
  ansible.builtin.copy:
    content: "{{ manage_user_name }} ALL=(ALL:ALL) NOPASSWD: ALL\n"
    dest: "/etc/sudoers.d/{{ manage_user_name | replace('.', '_') }}"
    owner: root
    group: root
    mode: "0440"
    validate: "/usr/sbin/visudo -cf %s"
  when:
    - manage_user_state == 'present'
    - manage_user_sudo | bool

- name: Remove sudoers entry when sudo access is not required
  become: true
  ansible.builtin.file:
    path: "/etc/sudoers.d/{{ manage_user_name | replace('.', '_') }}"
    state: absent
  when:
    - manage_user_state == 'present'
    - not manage_user_sudo | bool

- name: Remove sudoers entry for absent user
  become: true
  ansible.builtin.file:
    path: "/etc/sudoers.d/{{ manage_user_name | replace('.', '_') }}"
    state: absent
  when: manage_user_state == 'absent'
