---
# AllowUsers and AllowGroups are managed directly in /etc/ssh/sshd_config via
# lineinfile. Drop-in files are not used — OpenSSH's Include directive requires
# 8.2+; Ubuntu 18.04 ships 7.6.
#
# Both directives are append-only: existing entries are always preserved.
# validate: runs sshd -t against a temp copy before touching the real file.

- name: Read current sshd_config
  ansible.builtin.slurp:
    src: /etc/ssh/sshd_config
  register: _sshd_config_raw
  when: (manage_user_sshd_allowusers | bool) or (manage_user_allowgroups | length > 0)

# ── AllowUsers ────────────────────────────────────────────────────────────────

- name: Build AllowUsers list from present managed accounts
  ansible.builtin.set_fact:
    _manage_user_allowusers_computed: >-
      {{
        (
          (manage_user_accounts | rejectattr('state', 'defined') | list) +
          (manage_user_accounts | selectattr('state', 'defined') | selectattr('state', 'equalto', 'present') | list)
        )
        | rejectattr('allow_ssh', 'equalto', false)
        | map(attribute='name')
        | list
        + manage_user_allowusers_extra
      }}
  when: manage_user_sshd_allowusers | bool

- name: Extract existing AllowUsers entries from sshd_config
  ansible.builtin.set_fact:
    _current_allowusers: >-
      {{
        (
          (_sshd_config_raw.content | b64decode).split('\n')
          | select('match', '^AllowUsers\s')
          | list + ['']
        )[0]
        | regex_replace('^AllowUsers\s+', '')
        | split
        | select('ne', '')
        | list
      }}
  when: manage_user_sshd_allowusers | bool

- name: Build merged AllowUsers list (append only — existing entries preserved)
  ansible.builtin.set_fact:
    _manage_user_allowusers_merged: >-
      {{
        _current_allowusers
        + (_manage_user_allowusers_computed | difference(_current_allowusers))
      }}
  when: manage_user_sshd_allowusers | bool

- name: Assert AllowUsers list is not empty
  ansible.builtin.assert:
    that: _manage_user_allowusers_merged | length > 0
    fail_msg: >-
      manage_user_sshd_allowusers is enabled but the AllowUsers list is
      empty — writing it would block all SSH access. Add at least one
      present account, or set manage_user_sshd_allowusers: false to disable.
  when: manage_user_sshd_allowusers | bool

- name: Set AllowUsers in sshd_config
  become: true
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?AllowUsers'
    line: "AllowUsers {{ _manage_user_allowusers_merged | join(' ') }}"
    state: present
    validate: /usr/sbin/sshd -t -f %s
  when: manage_user_sshd_allowusers | bool
  notify: Restart SSH

- name: Remove AllowUsers from sshd_config
  become: true
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^AllowUsers'
    state: absent
    validate: /usr/sbin/sshd -t -f %s
  when: not manage_user_sshd_allowusers | bool
  notify: Restart SSH

# ── AllowGroups ───────────────────────────────────────────────────────────────

- name: Extract existing AllowGroups entries from sshd_config
  ansible.builtin.set_fact:
    _current_allowgroups: >-
      {{
        (
          (_sshd_config_raw.content | b64decode).split('\n')
          | select('match', '^AllowGroups\s')
          | list + ['']
        )[0]
        | regex_replace('^AllowGroups\s+', '')
        | split
        | select('ne', '')
        | list
      }}
  when: manage_user_allowgroups | length > 0

- name: Build merged AllowGroups list (append only — existing entries preserved)
  ansible.builtin.set_fact:
    _manage_user_allowgroups_merged: >-
      {{
        _current_allowgroups
        + (manage_user_allowgroups | difference(_current_allowgroups))
      }}
  when: manage_user_allowgroups | length > 0

- name: Set AllowGroups in sshd_config
  become: true
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?AllowGroups'
    line: "AllowGroups {{ _manage_user_allowgroups_merged | join(' ') }}"
    state: present
    validate: /usr/sbin/sshd -t -f %s
  when: manage_user_allowgroups | length > 0
  notify: Restart SSH
