---
# All item fields are resolved into manage_user_* vars here so that downstream
# task files never reference item.* directly — keeps execution logic decoupled
# from the loop structure and lets manage_user.yml be reasoned about in isolation.
# Two separate loops (not one with a type flag) because service accounts differ
# in shell default, system flag, and have no SSH key at all.
- name: Manage user account
  ansible.builtin.include_tasks: manage_user.yml
  vars:
    manage_user_name: "{{ item.name }}"
    manage_user_state: "{{ item.state | default('present') }}"
    manage_user_shell: "{{ item.shell | default(manage_user_default_shell) }}"
    manage_user_home: "{{ item.home | default(manage_user_default_home_base + '/' + item.name) }}"
    manage_user_comment: "{{ item.comment | default('') }}"
    manage_user_groups: "{{ item.groups | default([]) }}"
    manage_user_append_groups: "{{ item.append_groups | default(true) }}"
    manage_user_sudo: "{{ item.sudo | default(false) }}"
    manage_user_uid: "{{ item.uid | default(omit) }}"
    manage_user_ssh_public_keys: >-
      {{
        item.ssh_public_keys
        | default(([item.ssh_public_key] if item.ssh_public_key is defined else []))
      }}
    manage_user_ssh_key_exclusive: "{{ item.ssh_key_exclusive | default(false) }}"
    manage_user_remove_home: "{{ item.remove_home | default(false) }}"
    manage_user_system: false
    manage_user_is_service_account: false
  loop: "{{ manage_user_accounts }}"
  loop_control:
    label: "{{ item.name }}"

- name: Manage service account
  ansible.builtin.include_tasks: manage_user.yml
  vars:
    manage_user_name: "{{ item.name }}"
    manage_user_state: "{{ item.state | default('present') }}"
    manage_user_shell: "{{ item.shell | default(manage_user_service_account_default_shell) }}"
    manage_user_home: "{{ item.home | default(manage_user_default_home_base + '/' + item.name) }}"
    manage_user_comment: "{{ item.comment | default('') }}"
    manage_user_groups: "{{ item.groups | default([]) }}"
    manage_user_append_groups: "{{ item.append_groups | default(true) }}"
    manage_user_sudo: "{{ item.sudo | default(false) }}"
    manage_user_uid: "{{ item.uid | default(omit) }}"
    manage_user_ssh_public_keys: []
    manage_user_ssh_key_exclusive: false
    manage_user_remove_home: "{{ item.remove_home | default(false) }}"
    manage_user_system: true
    manage_user_is_service_account: true
  loop: "{{ manage_user_service_accounts }}"
  loop_control:
    label: "{{ item.name }}"

# sshd configuration — runs once after all accounts are processed, not per-user.
# Drop-in files (/etc/ssh/sshd_config.d/) require OpenSSH 8.2+; Ubuntu 18.04
# ships 7.6, so all sshd settings are managed directly in sshd_config instead.
#
# Cleanup: remove the Include directive and drop-in files written by earlier
# versions of this role before the 18.04 compatibility issue was discovered.
# These tasks are idempotent and safe to run even if the files were never created.
- name: Remove sshd_config Include directive added by earlier role versions
  become: true
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    line: "Include /etc/ssh/sshd_config.d/*.conf"
    state: absent
  notify: Restart SSH

- name: Remove sshd AllowUsers drop-in file added by earlier role versions
  become: true
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d/allowusers.conf
    state: absent

- name: Remove sshd crypto drop-in file added by earlier role versions
  become: true
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d/crypto.conf
    state: absent

- name: Manage sshd AllowUsers
  ansible.builtin.include_tasks: add_sshd.yml

- name: Manage sshd crypto policy
  ansible.builtin.include_tasks: add_sshd_crypto.yml

# Validate the full sshd configuration after any changes. sshd -t exits
# non-zero on syntax or algorithm errors, failing the play before the
# Restart SSH handler fires — the daemon is never restarted with a broken config.
- name: Validate sshd configuration
  become: true
  ansible.builtin.command: sshd -t
  changed_when: false
